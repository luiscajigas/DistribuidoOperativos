        cmd: docker build -t zt/analytics-archiver:local -f /opt/zero-trust/repo/apps/analytics-archiver/Dockerfile /opt/zero-trust/repo

    - name: Write analytics-archiver env file
      ansible.builtin.copy:
        dest: /opt/zero-trust/services/analytics-archiver/service.env
        owner: root
        group: root
        mode: "0600"
        content: |
          AUTH_BASE_URL=https://{{ vm_auth_ip }}
          CLIENT_ID=analytics-archiver
          CLIENT_SECRET={{ analytics_archiver_client_secret }}
          AUTH_TLS_CA_PATH=/certs/ca.crt
          KAFKA_BROKERS={{ vm_brokers_ip }}:9092
          KAFKA_TLS_CA_PATH=/certs/ca.crt
          ARCHIVE_DIR=/opt/zero-trust/archive
          FLUSH_INTERVAL_MS=2000

    - name: Install analytics-archiver systemd unit
      ansible.builtin.template:
        src: templates/systemd/analytics-archiver.service.j2
        dest: /etc/systemd/system/analytics-archiver.service
        owner: root
        group: root
        mode: "0644"

    # ---------- reload + start todos ----------
    - name: Reload systemd (vm-core)
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start vote-processor
      ansible.builtin.systemd:
        name: vote-processor
        enabled: true
        state: restarted

    - name: Start bot-detector-service
      ansible.builtin.systemd:
        name: bot-detector-service
        enabled: true
        state: restarted

    - name: Start regional-rollup-service
      ansible.builtin.systemd:
        name: regional-rollup-service
        enabled: true
        state: restarted

    - name: Start analytics-archiver
      ansible.builtin.systemd:
        name: analytics-archiver
        enabled: true
        state: restarted

- name: Deploy vm-app dashboard workers (global-dashboard, regional-dashboard)
  hosts: vm_app
  become: true
  vars:
    vm_auth_ip: "{{ hostvars['vm-auth'].private_ip }}"
    vm_brokers_ip: "{{ hostvars['vm-brokers'].private_ip }}"
    global_dashboard_client_secret: zt-gl0bal-dash-2025
    regional_dashboard_client_secret: zt-reg-dash-2025
  tasks:
    - name: Create service directories (vm-app)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /opt/zero-trust/services
        - /opt/zero-trust/services/global-dashboard-worker
        - /opt/zero-trust/services/regional-dashboard-worker

    # ---------- global-dashboard-worker ----------
    - name: Build global-dashboard-worker image
      ansible.builtin.command:
        cmd: docker build -t zt/global-dashboard-worker:local -f /opt/zero-trust/repo/apps/global-dashboard-worker/Dockerfile /opt/zero-trust/repo

    - name: Write global-dashboard-worker env file
      ansible.builtin.copy:
        dest: /opt/zero-trust/services/global-dashboard-worker/service.env
        owner: root
        group: root
        mode: "0600"
        content: |
          PORT=8080
          AUTH_BASE_URL=https://{{ vm_auth_ip }}
          CLIENT_ID=global-dashboard-worker
          CLIENT_SECRET={{ global_dashboard_client_secret }}
          AUTH_TLS_CA_PATH=/certs/ca.crt
          RABBIT_HOST={{ vm_brokers_ip }}
          RABBIT_PORT=5672
          RABBIT_TLS_CA_PATH=/certs/ca.crt

    - name: Install global-dashboard-worker systemd unit
      ansible.builtin.template:
        src: templates/systemd/global-dashboard-worker.service.j2
        dest: /etc/systemd/system/global-dashboard-worker.service
        owner: root
        group: root
        mode: "0644"

    # ---------- regional-dashboard-worker ----------
    - name: Build regional-dashboard-worker image
      ansible.builtin.command:
        cmd: docker build -t zt/regional-dashboard-worker:local -f /opt/zero-trust/repo/apps/regional-dashboard-worker/Dockerfile /opt/zero-trust/repo

    - name: Write regional-dashboard-worker env file
      ansible.builtin.copy:
        dest: /opt/zero-trust/services/regional-dashboard-worker/service.env
        owner: root
        group: root
        mode: "0600"
        content: |
          PORT=8081
          AUTH_BASE_URL=https://{{ vm_auth_ip }}
          CLIENT_ID=regional-dashboard-worker
          CLIENT_SECRET={{ regional_dashboard_client_secret }}
          AUTH_TLS_CA_PATH=/certs/ca.crt
          KAFKA_BROKERS={{ vm_brokers_ip }}:9092
          KAFKA_TLS_CA_PATH=/certs/ca.crt

    - name: Install regional-dashboard-worker systemd unit
      ansible.builtin.template:
        src: templates/systemd/regional-dashboard-worker.service.j2
        dest: /etc/systemd/system/regional-dashboard-worker.service
        owner: root
        group: root
        mode: "0644"

    # ---------- reload + start todos ----------
    - name: Reload systemd (vm-app)
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start global-dashboard-worker
      ansible.builtin.systemd:
        name: global-dashboard-worker
        enabled: true
        state: restarted

    - name: Start regional-dashboard-worker
      ansible.builtin.systemd:
        name: regional-dashboard-worker
        enabled: true
        state: restarted
